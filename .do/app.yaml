name: first-walk-us-website
services:
  - name: web
    github:
      branch: main
      deploy_on_push: true
      repo: YOUR_GITHUB_USERNAME/first-walk-us-website
    build_command: pnpm install --frozen-lockfile && pnpm build
    run_command: node .output/server/index.mjs
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    http_port: 3000
    routes:
      - path: /
